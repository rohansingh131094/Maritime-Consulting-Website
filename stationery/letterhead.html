<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Girideep Singh Letterhead</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="stationery.css" />
  </head>
  <body>
    <main class="sheet letterhead">
      <header class="letterhead-header">
        <div class="identity">
          <div class="brand-mark">GS</div>
          <div>
            <h1>Girideep Singh</h1>
            <p>Marine &amp; Defence Consulting</p>
          </div>
        </div>
        <address class="contact-block">
          <span>girideepsingh@icloud.com</span>
          <span>Mob: +91 77995 55531</span>
          <span>Gurugram, Haryana, India</span>
        </address>
      </header>

      <section class="letter-body" aria-label="Letter content area">
      </section>

      <footer class="letterhead-footer">
        <div>
          <span><strong>Expertise:</strong> Shipbuilding | Ship Repair | Submarine Refit | Strategic Projects</span>
          <span>Commodore, Indian Navy (Retd) | Former CMD, Hindustan Shipyard</span>
        </div>
        <div class="letterhead-qr">
          <img src="../assets/girideep-website-qr.png" alt="QR code for girideepsingh.com" />
          <span>girideepsingh.com</span>
        </div>
      </footer>
    </main>
  </body>
</html>
